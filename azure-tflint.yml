trigger: none
pool: Rakshak Pipelines

jobs:
  - job: terraformtflint
    displayName: terraform tflint integration
    steps:
      - checkout: self
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(System.DefaultWorkingDirectory)\Environment\Dev'
          backendServiceArm: 'rakshak-svc'
          backendAzureRmStorageAccountName: 'rakshakstg1'
          backendAzureRmContainerName: 'tfstate'
          backendAzureRmKey: 'dev.terraform.tfstate'
      
      - task: TerraformTask@5
        displayName: terraformValidate
        inputs:
          provider: 'azurerm'
          command: 'validate'
          workingDirectory: '$(System.DefaultWorkingDirectory)\Environment\Dev'

  - job: tflint 
    displayName: tflint 
    dependsOn: terraformtflint
    steps:
      - checkout: self
      - script: |
          tflint --init
        displayName: tflint init

      - script: |
          tflint --init
          tflint --chdir=Environment/Dev
        displayName: 'Run TFLint'
      
      