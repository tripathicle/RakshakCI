resources:
  repositories:
    - repository: templates
      type: github
      name: tripathicle/templates
      endpoint: pat-github-svc-pipeline
      ref: refs/heads/main

trigger:
  branches:
    include:
      - dev

# CENTRALIZED VARIABLES (NO HARDCODING)
variables:
  workingDir: '$(System.DefaultWorkingDirectory)/Environment/Dev'
  serviceConnection: 'rakshak-svc'
  storageAccount: 'rakshakstg1'
  containerName: 'tfstate'
  tfstateKey: 'dev.terraform.tfstate'

stages:

#  INIT STAGE
- stage: Init
  displayName: Terraform Init Stage
  pool: Rakshak Pipelines
  jobs:
    - template: templates/jobinit.yml@templates
      parameters:
        workingDir: $(workingDir)
        serviceConnection: $(serviceConnection)
        storageAccount: $(storageAccount)
        containerName: $(containerName)
        tfstateKey: $(tfstateKey)

#  VALIDATE STAGE
- stage: Validate
  displayName: Terraform Validate Stage
  dependsOn: Init
  pool: Rakshak Pipelines
  jobs:
    - template: templates/jobvalidate.yml@templates
      parameters:
        workingDir: $(workingDir)
        serviceConnection: $(serviceConnection)
        storageAccount: $(storageAccount)
        containerName: $(containerName)
        tfstateKey: $(tfstateKey)

#  PLAN STAGE
- stage: Plan
  displayName: Terraform Plan Stage
  dependsOn: Validate
  pool: Rakshak Pipelines
  jobs:
    - template: templates/jobplan.yml@templates
      parameters:
        workingDir: $(workingDir)
        serviceConnection: $(serviceConnection)
        storageAccount: $(storageAccount)
        containerName: $(containerName)
        tfstateKey: $(tfstateKey)

#  APPLY STAGE
- stage: Apply
  displayName: Terraform Apply Stage
  dependsOn: Plan
  pool: Rakshak Pipelines
  jobs:
    - job: terraformApply
      displayName: Terraform Apply Job
      steps:
        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: $(workingDir)
            backendServiceArm: $(serviceConnection)
            backendAzureRmStorageAccountName: $(storageAccount)
            backendAzureRmContainerName: $(containerName)
            backendAzureRmKey: $(tfstateKey)

        - task: TerraformTask@5
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: $(workingDir)
            environmentServiceNameAzureRM: $(serviceConnection)