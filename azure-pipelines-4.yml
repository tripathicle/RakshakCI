resources:
  repositories:
    - repository: templates
      type: github
      name: tripathicle/templates
      endpoint: pat-github-svc-pipeline
      ref: refs/heads/main

trigger:
  branches:
    include:
      - dev

stages:

# 🔹 INIT STAGE
- stage: Init
  displayName: Terraform Init Stage
  pool: Rakshak Pipelines
  jobs:
    - template: templates/jobinit.yml@templates
      parameters:
        workingDir: '$(System.DefaultWorkingDirectory)/Environment/Dev'
        serviceConnection: 'rakshak-svc'
        storageAccount: 'rakshakstg1'
        containerName: 'tfstate'
        tfstateKey: 'dev.terraform.tfstate'

# 🔹 VALIDATE STAGE
- stage: Validate
  displayName: Terraform Validate Stage
  dependsOn: Init   
  pool: Rakshak Pipelines
  jobs:
    - template: templates/jobvalidate.yml@templates
      parameters:
        workingDir: '$(System.DefaultWorkingDirectory)/Environment/Dev'

# 🔹 PLAN STAGE
- stage: Plan
  displayName: Terraform Plan Stage
  dependsOn: Validate
  pool: Rakshak Pipelines
  jobs:
    - template: templates/jobplan.yml@templates
      parameters:
        workingDir: '$(System.DefaultWorkingDirectory)/Environment/Dev'
        serviceConnection: 'rakshak-svc'
        storageAccount: 'rakshakstg1'
        containerName: 'tfstate'
        tfstateKey: 'dev.terraform.tfstate'

# 🔹 APPLY STAGE
- stage: Apply
  displayName: Terraform Apply Stage
  dependsOn: Plan  
  pool: Rakshak Pipelines
  jobs:
    - job: terraformApply
      displayName: Terraform Apply Job
      steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
            backendServiceArm: 'rakshak-svc'
            backendAzureRmStorageAccountName: 'rakshakstg1'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev.terraform.tfstate'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
            environmentServiceNameAzureRM: 'rakshak-svc'