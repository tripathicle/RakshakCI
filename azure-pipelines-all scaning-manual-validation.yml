trigger: none

pool: Rakshak Pipelines

stages:

# -------------------------------
# STAGE 1: TERRAFORM INIT + VALIDATE
# -------------------------------
- stage: Validate
  displayName: "Terraform Init & Validate"
  jobs:
    - job: terraform_init_validate
      steps:
        - checkout: self

        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
            backendServiceArm: 'rakshak-svc'
            backendAzureRmStorageAccountName: 'rakshakstg1'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev.terraform.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Validate
          inputs:
            provider: 'azurerm'
            command: 'validate'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'


# -------------------------------
# STAGE 2: LINT + SECURITY SCANS (IFRA)
# -------------------------------
- stage: SecurityScan
  displayName: "Linting & Security Scanning"
  dependsOn: Validate
  jobs:
    - job: scanning
      steps:
        - checkout: self

        # TFLINT
        - script: |
            tflint --init
            tflint --chdir=Environment/Dev
          displayName: "Run TFLint"

        # CHECKOV (Infra Security)
        - script: |
            pip install checkov
            checkov -d Environment/Dev
          displayName: "Run Checkov Scan"

        # TFSEC (Terraform Security)
        - script: |
            curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
            tfsec Environment/Dev
          displayName: "Run tfsec Scan"

        # TERRASCAN
        - script: |
            curl -L https://github.com/tenable/terrascan/releases/latest/download/terrascan_linux_amd64.tar.gz | tar -xz
            sudo install terrascan /usr/local/bin
            terrascan scan -i terraform -d Environment/Dev
          displayName: "Run Terrascan"


# -------------------------------
# STAGE 3: MANUAL VALIDATION
# -------------------------------
- stage: ManualApproval
  displayName: "Manual Validation"
  dependsOn: SecurityScan
  jobs:
    - job: approval
      pool: server
      steps:
        - task: ManualValidation@0
          inputs:
            instructions: "Approve to proceed with Terraform Plan & Apply"
            notifyUsers: sktripathiinfo@gmail.com'
            timeout: '1d'


# -------------------------------
# STAGE 4: TERRAFORM PLAN
# -------------------------------
- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: ManualApproval
  jobs:
    - job: terraform_plan
      steps:
        - checkout: self

        - task: TerraformTask@5
          displayName: Terraform Plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
            environmentServiceNameAzureRM: 'rakshak-svc'


# -------------------------------
# STAGE 5: TERRAFORM APPLY
# -------------------------------
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan
  condition: succeeded()
  jobs:
    - job: terraform_apply
      steps:
        - checkout: self

        - task: TerraformTask@5
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
            environmentServiceNameAzureRM: 'rakshak-svc'