trigger:
 branches:
   include:
     
     - dev



jobs:
  - template: ./Templates/terraform_init.yml

  - job: Terraform_init
    displayName: terraform init 
    pool: Rakshak Pipelines
  
   # steps:
   #   - template: Templates/terraform_init.yml
      # - task: TerraformTask@5
      #   inputs:
      #     provider: 'azurerm'
      #     command: 'init'
      #     workingDirectory: '$(System.DefaultWorkingDirectory)\Environment\Dev'
      #     backendServiceArm: 'rakshak-svc'
      #     backendAzureRmStorageAccountName: 'rakshakstg1'
      #     backendAzureRmContainerName: 'tfstate'
      #     backendAzureRmKey: 'dev.terraform.tfstate'

  - job: terraform_validate
    displayName: terradform validate
    dependsOn: terraform_init
    pool: Rakshak Pipelines
    steps:
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(System.DefaultWorkingDirectory)\Environment\Dev'
          backendServiceArm: 'rakshak-svc'
          backendAzureRmStorageAccountName: 'rakshakstg1'
          backendAzureRmContainerName: 'tfstate'
          backendAzureRmKey: 'dev.terraform.tfstate'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'validate'
          workingDirectory: '$(System.DefaultWorkingDirectory)\Environment\Dev'

  - job: terraform_plan
    displayName: terraform plan
    dependsOn: terraform_validate
    pool: Rakshak Pipelines
    steps:
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(System.DefaultWorkingDirectory)\Environment\Dev'
          backendServiceArm: 'rakshak-svc'
          backendAzureRmStorageAccountName: 'rakshakstg1'
          backendAzureRmContainerName: 'tfstate'
          backendAzureRmKey: 'dev.terraform.tfstate'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'plan'
          workingDirectory: '$(System.DefaultWorkingDirectory)\Environment\Dev'
          environmentServiceNameAzureRM: 'rakshak-svc'


      


      
      


    